{% extends 'department_hod_template/base_template.html' %}
{% block page_title %}
Academic Logistics
{% endblock page_title %}

{% block main_content %}
    <div class="card glass">
      <div class="chart-header">
        <h3>Timetable Distribution</h3>
        <p>Publish academic schedules for specific classes and semesters.</p>
      </div>

      <form class="modern-form" action="/department_hod_upload_timetable_save" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-content">
          <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
              <label>Target Academic Class</label>
              <div class="input-wrapper">
                <select name="class_id" required>
                  <option value="">Select Class</option>
                  {% for class in classes %}
                    <option value="{{ class.id }}">{{ class.class_name }}</option>
                  {% endfor %}
                </select>
              </div>
            </div>

            <div class="form-group">
              <label>Academic Semester</label>
              <div class="input-wrapper">
                <select name="semester_id" required>
                  <option value="">Select Semester</option>
                  {% for semester in semesters %}
                    <option value="{{ semester.id }}">{{ semester.semester_start_date }} TO {{ semester.semester_end_date }}</option>
                  {% endfor %}
                </select>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>Document Upload (PDF, Word, or Excel)</label>
            <div class="input-wrapper">
              <input type="file" name="timetable_file" accept=".pdf,.doc,.docx,.xls,.xlsx" required>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-upload"></i>
            Initialize Upload & Distribute
          </button>
        </div>
      </form>
    </div>
{% endblock main_content %}
