{% load static %}
  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a href="{% url 'department_hod_home' %}" class="brand-link">
      <img src="{% static "dist/img/AdminLTELogo.png" %}" alt="AdminLTE Logo" class="brand-image img-circle elevation-3"
           style="opacity: .8">
      <span class="brand-text font-weight-light">Department HOD</span>
    </a>
    <div class="sidebar">
      <div class="user-panel mt-3 pb-3 mb-3 d-flex">
        <div class="image">
          <img src="{% static "dist/img/user2-160x160.jpg" %}" class="img-circle elevation-2" alt="User Image">
        </div>
        <div class="info">
          <a href="#" class="d-block">{{ user.username }}</a>
        </div>
      </div>
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu" data-accordion="false">
          <li class="nav-item">
            {% url 'department_hod_home' as department_hod_home %}
            <a href="{{ department_hod_home }}" class="nav-link {% if request.path == department_hod_home %} active {% endif %}">
              <i class="nav-icon fas fa-tachometer-alt"></i>
              <p>Home</p>
            </a>
          </li>
          <li class="nav-item">
            {% url 'department_hod_upload_timetable' as department_hod_upload_timetable %}
            <a href="{% url 'department_hod_upload_timetable' %}" class="nav-link {% if request.path == department_hod_upload_timetable %} active {% endif %}">
              <i class="nav-icon fas fa-calendar-alt"></i>
              <p>Upload Timetable</p>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </aside>
