{% load static %}
<aside class="sidebar glass">
  <div class="sidebar-brand">
    <div class="brand-icon">
      <i class="fas fa-microchip"></i>
    </div>
    <div class="brand-text">
      <h1>U-MAS</h1>
      <span>Dept. HOD Panel</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">
      <span class="section-label">Overview</span>
      {% url 'department_hod_home' as department_hod_home %}
      <a href="{{ department_hod_home }}" class="nav-link {% if request.path == department_hod_home %}active{% endif %}">
        <i class="fas fa-tachometer-alt"></i>
        <span>Department Home</span>
      </a>
    </div>

    <div class="nav-section">
      <span class="section-label">Academic Management</span>
      {% url 'department_hod_upload_timetable' as department_hod_upload_timetable %}
      <a href="{{ department_hod_upload_timetable }}" class="nav-link {% if request.path == department_hod_upload_timetable %}active{% endif %}">
        <i class="fas fa-calendar-alt"></i>
        <span>Upload Timetable</span>
      </a>
    </div>

    <div class="nav-section">
      <span class="section-label">Session Control</span>
      <a href="{% url 'logout' %}" class="nav-link">
        <i class="fas fa-sign-out-alt"></i>
        <span>Sign Out</span>
      </a>
    </div>
  </nav>
</aside>
