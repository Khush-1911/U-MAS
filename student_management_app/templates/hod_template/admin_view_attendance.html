{% extends 'hod_template/base_template.html' %}
{% block page_title %}
View Attendance
{% endblock page_title %}
{% block main_content %}
    
            
            <div class="bg-surface-container-lowest rounded-2xl overflow-hidden border border-outline-variant/10 shadow-xl shadow-indigo-900/5">
              <div class="px-8 py-6 border-b border-outline-variant/10">
                <h3 class="font-display font-extrabold text-on-surface text-2xl">Attendance Records</h3>
                <p class="text-on-surface-variant text-sm mt-1">Select parameters to retrieve historical attendance data.</p>
              </div>
              
                <div class="p-8 space-y-8">
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                      <label class="block font-label text-sm font-bold text-on-surface-variant">Academic Subject</label>
                      <select class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body" name="subject" id="subject">
                          {% for subject in subjects %}
                            <option value="{{ subject.id }}">{{ subject.subject_name }}</option>
                          {% endfor %}
                      </select>
                    </div>
                    <div class="space-y-2">
                      <label class="block font-label text-sm font-bold text-on-surface-variant">Active Semester</label>
                      <select class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body" name="semester_id" id="semester_id">
                          {% for semester in semesters %}
                            <option value="{{ semester.id }}">{{ semester.semester_start_date }} TO {{ semester.semester_end_date }}</option>
                          {% endfor %}
                      </select>
                    </div>
                  </div>

                  <button type="button" class="w-full py-4 premium-gradient text-white font-display font-bold rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform" id="fetch_attendance">
                    <span class="material-symbols-outlined align-middle mr-2">event_list</span>
                    Fetch Available Dates
                  </button>

                  <div class="space-y-4" id="attendance_block" style="display:none">
                    <label class="block font-label text-sm font-bold text-on-surface-variant">Select Attendance Session</label>
                    <select class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body" name="attendance_date" id="attendance_date">
                    </select>
                    
                    <button type="button" class="w-full py-4 bg-secondary text-white font-display font-bold rounded-xl shadow-lg shadow-secondary/20 active:scale-[0.98] transition-transform mt-4" id="fetch_student">
                      <span class="material-symbols-outlined align-middle mr-2">groups</span>
                      Retrieve Student Roster
                    </button>
                  </div>

                  <div id="error_attendance" class="px-5 py-4 rounded-2xl text-sm font-medium flex items-center gap-3 bg-error/10 text-error hidden">
                    <span class="material-symbols-outlined">error</span>
                    <span id="error_msg"></span>
                  </div>
                </div>
                
                <div id="student_data" class="px-8 pb-8">
                </div>
            </div>
            

          
{% endblock main_content %}
{% block custom_js %}
<script>
    $(document).ready(function(){

        $("#fetch_attendance").click(function(){
               var subject=$("#subject").val();
               var semester=$("#semester_id").val();

            $.ajax({
                    url:'{% url 'admin_get_attendance_dates' %}',
                    type:'POST',
                    data:{subject:subject,semester_id:semester},
                })
                .done(function(response){
                    var json_data=JSON.parse(response);
                    if(json_data.length>0)
                    {
                        var html_data="";
                        for(key in json_data)
                        {
                            html_data+="<option value="+json_data[key]["id"]+">"+json_data[key]["attendance_date"]+"</option>";
                        }
                        $("#error_attendance").addClass("hidden");
                        $("#attendance_block").show();
                        $("#attendance_date").html(html_data);
                     }
                     else
                     {
                        $("#error_msg").text("No Attendance Data Found");
                        $("#error_attendance").removeClass("hidden");
                        $("#attendance_block").hide();
                        $("#attendance_date").html("");
                     }
                })
                .fail(function(){
                    alert("Error in Fetching Attendance")
                    $("#attendance_block").hide();
                });
        })

        $("#fetch_student").click(function(){
            var attendance_date=$("#attendance_date").val()
            $.ajax({
                url:'{% url 'admin_get_attendance_student' %}',
                type:'POST',
                data:{attendance_date:attendance_date},
            })
            .done(function(response){
                var json_data=JSON.parse(response);
                var div_data = `
                    <div class="mt-8 space-y-4">
                        <label class="block font-label text-sm font-bold text-on-surface-variant uppercase tracking-widest">Attendance Status</label>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                `;
                for(key in json_data)
                {
                    const statusClass = json_data[key]['status'] ? 'bg-secondary/10 text-secondary' : 'bg-error/10 text-error';
                    const statusText = json_data[key]['status'] ? 'Present' : 'Absent';
                    const icon = json_data[key]['status'] ? 'check_circle' : 'cancel';
                    
                    div_data += `
                        <div class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl border border-outline-variant/10">
                            <span class="font-body font-medium text-on-surface">${json_data[key]['name']}</span>
                            <span class="flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold uppercase ${statusClass}">
                                <span class="material-symbols-outlined text-xs">${icon}</span>
                                ${statusText}
                            </span>
                        </div>
                    `;
                }
                div_data += "</div></div>";
                $("#student_data").html(div_data);
            })
            .fail(function(){
                alert("Error in Fetching Student")
            })
         })

    })
</script>
{% endblock custom_js %}
