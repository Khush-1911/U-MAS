{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>U-MAS | Student Signup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{% static "plugins/fontawesome-free/css/all.min.css" %}">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="{% static "ui/app.css" %}">
</head>
<body class="app">
<div class="login-shell">
  <div class="login-card">
    {% include 'includes/toast_messages.html' %}
    <div class="login-title">Student Signup</div>
    <div class="login-subtitle">Create a student account for U-MAS.</div>

    <form action="/do_signup_student" method="post" id="demo-form" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="space-y-2">
        <label class="block font-label text-sm font-bold text-on-surface-variant">Email</label>
        <input type="email" class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body" placeholder="you@example.com" name="email" required>
      </div>
      <div class="form-group" style="margin-top:12px;">
        <label class="block font-label text-sm font-bold text-on-surface-variant">First Name</label>
        <input class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body" placeholder="First name" name="first_name" required>
      </div>
      <div class="form-group" style="margin-top:12px;">
        <label class="block font-label text-sm font-bold text-on-surface-variant">Last Name</label>
        <input class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body" placeholder="Last name" name="last_name" required>
      </div>
      <div class="form-group" style="margin-top:12px;">
        <label class="block font-label text-sm font-bold text-on-surface-variant">Username</label>
        <input class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body" placeholder="username" name="username" required>
      </div>
      <div class="form-group" style="margin-top:12px;">
        <label class="block font-label text-sm font-bold text-on-surface-variant">Password</label>
        <input type="password" class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body" placeholder="••••••••" name="password" required>
      </div>
      <div class="form-group" style="margin-top:12px;">
        <label class="block font-label text-sm font-bold text-on-surface-variant">Address</label>
        <input class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body" placeholder="Address" name="address" required>
      </div>
      <div class="form-group" style="margin-top:12px;">
        <label class="block font-label text-sm font-bold text-on-surface-variant">Department</label>
        <select class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body" name="department" required>
          <option value="">Select department</option>
          {% for department in departments %}
          <option value="{{ department.id }}">{{ department.department_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group" style="margin-top:12px;">
        <label class="block font-label text-sm font-bold text-on-surface-variant">Semester</label>
        <select class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body" name="semester" required>
          <option value="">Select semester</option>
          {% for semester in semesters %}
          <option value="{{ semester.id }}">{{ semester.semester_start_date|date:"d-m-Y" }} TO {{ semester.semester_end_date|date:"d-m-Y" }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group" style="margin-top:12px;">
        <label class="block font-label text-sm font-bold text-on-surface-variant">Sex</label>
        <select class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body" name="sex" required>
          <option value="">Select sex</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
      </div>
      <div class="form-group" style="margin-top:16px;">
        <button type="submit" class="w-full py-4 premium-gradient text-white font-display font-bold rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform">Signup Student</button>
      </div>
      {% if messages %}
        {% for message in messages %}
          {% if message.tags == 'error' %}
            <div class="px-5 py-4 rounded-2xl text-sm font-medium flex items-center gap-3 bg-error/10 text-error">{{ message }}</div>
          {% endif %}
        {% endfor %}
      {% endif %}
    </form>
  </div>
</div>
</body>
</html>
