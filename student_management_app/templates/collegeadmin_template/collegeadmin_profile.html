{% extends 'collegeadmin_template/base_template.html' %}
{% block page_title %}College Admin Profile{% endblock page_title %}

{% block main_content %}
<div class="max-w-3xl">
  <header class="mb-10">
    <h2 class="text-4xl font-extrabold text-on-surface font-headline tracking-tight">Administrative Identity</h2>
    <p class="text-on-surface-variant font-body mt-2">Manage your college management credentials.</p>
  </header>

  <div class="bg-surface-container-lowest rounded-2xl p-8">
    <form action="{% url 'collegeadmin_profile_save' %}" method="post" class="space-y-8">
      {% csrf_token %}
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-2">
          <label class="block font-label text-sm font-bold text-on-surface-variant">First Name</label>
          <input type="text" name="first_name" value="{{ user.first_name }}" required class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body">
        </div>
        <div class="space-y-2">
          <label class="block font-label text-sm font-bold text-on-surface-variant">Last Name</label>
          <input type="text" name="last_name" value="{{ user.last_name }}" required class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body">
        </div>
      </div>

      <div class="space-y-2">
        <label class="block font-label text-sm font-bold text-on-surface-variant">Master Identity (Email)</label>
        <input type="email" value="{{ user.email }}" disabled class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl text-on-surface font-body opacity-60 cursor-not-allowed">
      </div>

      <div class="space-y-2">
        <label class="block font-label text-sm font-bold text-on-surface-variant">Update Security Credential (Password)</label>
        <input type="password" name="password" placeholder="Leave blank to maintain current password" class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body">
      </div>

      <div class="pt-6 border-t border-outline-variant/20">
        <button type="submit" class="flex items-center gap-2 px-6 py-3 premium-gradient text-white font-label font-bold rounded-xl shadow-lg shadow-primary/20 active:scale-95 transition-transform">
          <span class="material-symbols-outlined">save</span>
          Commit Changes
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock main_content %}
