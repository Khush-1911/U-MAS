{% load static %}
<aside class="sidebar glass">
  <div class="sidebar-brand">
    <div class="brand-icon">
      <i class="fas fa-building"></i>
    </div>
    <div class="brand-text">
      <h1>U-MAS</h1>
      <span>College Suite</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">
      <span class="section-label">Institutional Management</span>
      {% url 'collegeadmin_home' as collegeadmin_home %}
      <a href="{{ collegeadmin_home }}" class="nav-link {% if request.path == collegeadmin_home %}active{% endif %}">
        <i class="fas fa-tachometer-alt"></i>
        <span>Dashboard</span>
      </a>
    </div>

    <div class="nav-section">
      <span class="section-label">Academic Data</span>
      
      {% url 'collegeadmin_manage_grades' as collegeadmin_manage_grades %}
      <a href="{{ collegeadmin_manage_grades }}" class="nav-link {% if request.path == collegeadmin_manage_grades %}active{% endif %}">
        <i class="fas fa-file-csv"></i>
        <span>Bulk Grade Upload</span>
      </a>
    </div>

    <div class="nav-section">
      <span class="section-label">Administration</span>
      <a href="#" class="nav-link">
        <i class="fas fa-user-cog"></i>
        <span>College Settings</span>
      </a>
      <a href="#" class="nav-link">
        <i class="fas fa-history"></i>
        <span>Audit Logs</span>
      </a>
    </div>
  </nav>
</aside>
