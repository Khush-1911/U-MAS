{% block page_title %}
Account Modification
{% endblock page_title %}

{% block main_content %}
    <div class="card glass">
      <div class="chart-header">
        <h3>Edit Professional Profile</h3>
        <p>Update institutional credentials and personal metadata for <strong>{{ user_obj.email }}</strong></p>
      </div>

      <form class="modern-form" action="{% url 'principal_edit_user_save' %}" method="post">
        {% csrf_token %}
        <input type="hidden" name="user_id" value="{{ user_obj.id }}">

        <div class="form-content">
          <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
              <label>Institutional Assignment</label>
              <div class="input-wrapper">
                <select name="institution" required>
                    <option value="">Select Institution</option>
                    {% for institution in institutions %}
                        <option value="{{ institution.id }}" {% if user_obj.institution.id == institution.id %}selected{% endif %}>{{ institution.name }}</option>
                    {% endfor %}
                </select>
              </div>
            </div>

            <div class="form-group">
              <label>Administrative Role</label>
              <div class="input-wrapper">
                <select name="role" required>
                    <option value="">Select Role</option>
                    {% for role in roles %}
                        <option value="{{ role.id }}" {% if user_obj.user_type == role.id %}selected{% endif %}>{{ role.name }}</option>
                    {% endfor %}
                </select>
              </div>
            </div>
          </div>

          <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
              <label>First Name</label>
              <div class="input-wrapper">
                <input type="text" name="first_name" value="{{ user_obj.first_name }}" required>
              </div>
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <div class="input-wrapper">
                <input type="text" name="last_name" value="{{ user_obj.last_name }}" required>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>Communication Email</label>
            <div class="input-wrapper">
              <input type="email" name="email" value="{{ user_obj.email }}" required>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i>
            Finalize Updates
          </button>
          <a href="{% url 'principal_manage_users' %}" class="btn btn-secondary" style="margin-left: 1rem;">Back to Directory</a>
        </div>
      </form>
    </div>
{% endblock main_content %}
