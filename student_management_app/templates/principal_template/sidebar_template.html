{% load static %}
<aside class="sidebar glass">
  <div class="sidebar-brand">
    <div class="brand-icon">
      <i class="fas fa-university"></i>
    </div>
    <div class="brand-text">
      <h1>U-MAS</h1>
      <span>Principal Suite</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">
      <span class="section-label">Institutional Overview</span>
      {% url 'principal_home' as principal_home %}
      <a href="{{ principal_home }}" class="nav-link {% if request.path == principal_home %}active{% endif %}">
        <i class="fas fa-tachometer-alt"></i>
        <span>Dashboard</span>
      </a>
    </div>

    <div class="nav-section">
      <span class="section-label">Personnel</span>
      
      {% url 'principal_manage_users' as principal_manage_users %}
      <a href="{{ principal_manage_users }}" class="nav-link {% if request.path == principal_manage_users %}active{% endif %}">
        <i class="fas fa-user-shield"></i>
        <span>Institutional Users</span>
      </a>
    </div>

    <div class="nav-section">
      <span class="section-label">Academic</span>
      <a href="{% url 'feature_coming_soon' %}" class="nav-link">
        <i class="fas fa-chart-line"></i>
        <span>Academic Progress</span>
      </a>
      <a href="{% url 'feature_coming_soon' %}" class="nav-link">
        <i class="fas fa-calendar-alt"></i>
        <span>Institution Calendar</span>
      </a>
    </div>
  </nav>
</aside>
