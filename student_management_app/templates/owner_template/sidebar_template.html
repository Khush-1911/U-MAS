{% load static %}
  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <!-- Brand Logo -->
    <a href="{% url 'owner_home' %}" class="brand-link">
      <img src="{% static "dist/img/AdminLTELogo.png" %}" alt="AdminLTE Logo" class="brand-image img-circle elevation-3"
           style="opacity: .8">
      <span class="brand-text font-weight-light">Owner Panel</span>
    </a>

    <!-- Sidebar -->
    <div class="sidebar">
      <!-- Sidebar user panel (optional) -->
      <div class="user-panel mt-3 pb-3 mb-3 d-flex">
        <div class="image">
          <img src="{% static "dist/img/user2-160x160.jpg" %}" class="img-circle elevation-2" alt="User Image">
        </div>
        <div class="info">
          <a href="#" class="d-block">{{ user.username }}</a>
        </div>
      </div>

      <!-- Sidebar Menu -->
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu" data-accordion="false">
          <!-- Add icons to the links using the .nav-icon class
               with font-awesome or any other icon font library -->
          <li class="nav-item">
            {% url 'owner_home' as owner_home %}
            <a href="{{ owner_home }}" class="nav-link {% if request.path == owner_home %} active {% endif %}">
              <i class="nav-icon fas fa-tachometer-alt"></i>
              <p>
                Home
              </p>
            </a>
          </li>
            <li class="nav-item">
            {% url 'add_institution' as add_institution %}
            <a href="{% url 'add_institution' %}" class="nav-link {% if request.path == add_institution %} active {% endif %}">
              <i class="nav-icon fas fa-university"></i>
              <p>
                Add Institution
              </p>
            </a>
          </li>
          <li class="nav-item">
            {% url 'add_user' as add_user %}
            <a href="{% url 'add_user' %}" class="nav-link {% if request.path == add_user %} active {% endif %}">
              <i class="nav-icon fas fa-user-plus"></i>
              <p>
                Add User
              </p>
            </a>
          </li>
        </ul>
      </nav>
      <!-- /.sidebar-menu -->
    </div>
    <!-- /.sidebar -->
  </aside>
