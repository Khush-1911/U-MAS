{% load static %}
<!-- SideNavBar -->
<aside class="h-screen w-72 fixed left-0 top-0 z-50 bg-slate-50/90 backdrop-blur-2xl flex flex-col border-r border-slate-200/50 py-10 shadow-xl shadow-indigo-900/5 hidden md:flex">
  <div class="px-8 mb-12">
    <h1 class="text-2xl font-black bg-gradient-to-br from-indigo-600 to-indigo-400 bg-clip-text text-transparent font-display">U-MAS</h1>
    <p class="text-xs font-label text-on-surface-variant tracking-wider uppercase mt-1">Owner Suite</p>
  </div>
  <nav class="flex-1 space-y-2">
    {% url 'owner_home' as owner_home %}
    <a class="{% if request.path == owner_home %}relative flex items-center gap-3 px-8 py-3 text-indigo-600 font-bold before:absolute before:left-0 before:h-6 before:w-1 before:bg-gradient-to-b before:from-indigo-600 before:to-indigo-400 before:rounded-r-full{% else %}flex items-center gap-3 px-8 py-3 text-slate-500 hover:bg-white/50 hover:text-indigo-600 transition-all duration-300{% endif %} font-medium" href="{{ owner_home }}">
      <span class="material-symbols-outlined" {% if request.path == owner_home %}style="font-variation-settings: 'FILL' 1;"{% endif %}>dashboard</span>
      <span>Dashboard</span>
    </a>

    {% url 'manage_institutions' as manage_institutions %}
    <a class="{% if 'institution' in request.path %}relative flex items-center gap-3 px-8 py-3 text-indigo-600 font-bold before:absolute before:left-0 before:h-6 before:w-1 before:bg-gradient-to-b before:from-indigo-600 before:to-indigo-400 before:rounded-r-full{% else %}flex items-center gap-3 px-8 py-3 text-slate-500 hover:bg-white/50 hover:text-indigo-600 transition-all duration-300{% endif %} font-medium" href="{{ manage_institutions }}">
      <span class="material-symbols-outlined" {% if 'institution' in request.path %}style="font-variation-settings: 'FILL' 1;"{% endif %}>account_balance</span>
      <span>Institutions</span>
    </a>

    {% url 'manage_users' as manage_users %}
    <a class="{% if 'user' in request.path %}relative flex items-center gap-3 px-8 py-3 text-indigo-600 font-bold before:absolute before:left-0 before:h-6 before:w-1 before:bg-gradient-to-b before:from-indigo-600 before:to-indigo-400 before:rounded-r-full{% else %}flex items-center gap-3 px-8 py-3 text-slate-500 hover:bg-white/50 hover:text-indigo-600 transition-all duration-300{% endif %} font-medium" href="{{ manage_users }}">
      <span class="material-symbols-outlined" {% if 'user' in request.path %}style="font-variation-settings: 'FILL' 1;"{% endif %}>group</span>
      <span>Users</span>
    </a>
  </nav>

  <div class="pt-6 border-t border-slate-200/50 px-2 space-y-1">
    <a class="flex items-center gap-3 px-6 py-3 text-slate-500 hover:bg-white/50 hover:text-indigo-600 transition-all duration-300 font-medium" href="{% url 'feature_coming_soon' %}">
      <span class="material-symbols-outlined">settings</span>
      <span>Settings</span>
    </a>
    <a class="flex items-center gap-3 px-6 py-3 text-slate-500 hover:bg-white/50 hover:text-indigo-600 transition-all duration-300 font-medium" href="{% url 'logout' %}">
      <span class="material-symbols-outlined">logout</span>
      <span>Logout</span>
    </a>
  </div>
</aside>
