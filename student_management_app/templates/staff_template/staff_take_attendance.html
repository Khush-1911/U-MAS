{% extends 'staff_template/base_template.html' %}
{% block page_title %}Attendance Registry{% endblock page_title %}

{% block main_content %}
<header class="mb-10">
  <h2 class="text-4xl font-extrabold text-on-surface font-headline tracking-tight">Attendance Registry</h2>
  <p class="text-on-surface-variant font-body mt-2">Select a subject and date to register student attendance.</p>
</header>

<div class="bg-surface-container-lowest rounded-2xl p-8 mb-8">
  <div class="space-y-6">
    <div class="space-y-2">
      <label class="block font-label text-sm font-bold text-on-surface-variant">Academic Subject</label>
      <select name="subject" id="subject" class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body">
        {% for subject in subjects %}
          <option value="{{ subject.id }}">{{ subject.subject_name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="space-y-2">
      <label class="block font-label text-sm font-bold text-on-surface-variant">Registration Date</label>
      <input type="date" name="attendance_date" id="attendance_date" value="{{ today_date }}" class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body">
    </div>

    <div class="pt-4">
      <button type="button" class="flex items-center gap-2 px-6 py-3 premium-gradient text-white font-label font-bold rounded-xl shadow-lg shadow-primary/20 active:scale-95 transition-transform" id="fetch_student">
        <span class="material-symbols-outlined">search</span>
        Fetch Enrolled Students
      </button>
    </div>
  </div>
</div>

<div id="student_data">
  <!-- AJAX content will load here -->
</div>
{% endblock main_content %}

{% block custom_js %}
<script>
    $(document).ready(function(){
        $("#fetch_student").click(function(){
            var subject=$("#subject").val()
            var attendance_date=$("#attendance_date").val()

            if(!attendance_date){
                alert("Please select attendance date");
                return;
            }

            $("#student_data").html("<div class='flex items-center justify-center gap-3 py-12 text-on-surface-variant'><span class='material-symbols-outlined animate-spin'>sync</span> Synchronizing roster...</div>");

            $.ajax({
                url:'{% url 'get_students' %}',
                type:'POST',
                data:{subject:subject,attendance_date:attendance_date},
            })
            .done(function(response){
                var json_data=JSON.parse(response);
                if(json_data.length===0){
                    $("#student_data").html("<div class='px-5 py-4 rounded-2xl text-sm font-medium flex items-center gap-3 bg-yellow-50 text-yellow-700'><span class='material-symbols-outlined'>warning</span>No students enrolled for the selected criteria.</div>");
                    return;
                }

                var div_data = "<div class='grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-8'>";
                for(key in json_data) {
                    div_data += "<div class='bg-surface-container-lowest rounded-xl p-5 border border-outline-variant/10 hover:border-primary/20 transition-all'>";
                    div_data += "  <label class='flex items-center gap-3 cursor-pointer' for='st_"+json_data[key]['id']+"'>";
                    div_data += "    <input type='checkbox' checked='checked' name='student_data[]' value='"+json_data[key]['id']+"' id='st_"+json_data[key]['id']+"' class='w-5 h-5 accent-indigo-600 rounded'>";
                    div_data += "    <span class='font-display font-bold text-on-surface text-sm'>"+json_data[key]['name']+"</span>";
                    div_data += "  </label>";
                    div_data += "</div>";
                }
                div_data += "</div>";
                div_data += "<div class='pt-4'>";
                div_data += "  <button id='save_attendance' class='w-full py-4 premium-gradient text-white font-display font-bold rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform border-none cursor-pointer' type='button'>Finalize Attendance Registry</button>";
                div_data += "</div>";

                $("#student_data").html(div_data);
            })
            .fail(function(){
                alert("Critical Error: Failed to synchronize student roster.");
            })
        });

        $(document).on("click","#save_attendance",function(){
            $(this).attr("disabled","disabled")
            $(this).html("<span class='material-symbols-outlined animate-spin inline-block align-middle mr-2'>sync</span> Committing Data...")
            
            var student_data=$("input[name='student_data[]']").map(function(){
                return {"id":$(this).val(),"status":($(this).is(":checked") ? 1 : 0)};
            }).get()
            
            var attendance_date=$("#attendance_date").val();
            var subject_id=$("#subject").val();
            
            $.ajax({
                url:'{% url 'save_attendance_data' %}',
                type:'POST',
                data:{student_ids:JSON.stringify(student_data),attendance_date:attendance_date,subject_id:subject_id},
            })
            .done(function(response){
                if(response=="OK"){
                    alert("Attendance registry successfully committed to secure vault.")
                    location.reload()
                } else {
                    alert("Data error: Persistence failed.")
                    $(this).removeAttr("disabled").text("Retry Finalization")
                }
            })
            .fail(function(){
                alert("Network error: Verification failure.")
                $(this).removeAttr("disabled").text("Retry Finalization")
            })
        });
    })
</script>
{% endblock custom_js %}
