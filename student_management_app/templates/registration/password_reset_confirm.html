{% extends 'registration/base.html' %}

{% block content %}
    {% if validlink %}
    <div class="p-8 space-y-8">
      <div class="text-center">
        <h3 class="text-2xl font-display font-extrabold text-on-surface">Change Password</h3>
        <p class="text-on-surface-variant font-body mt-2">Create a secure new credential.</p>
      </div>

      <form method="post" class="space-y-6">
          {% csrf_token %}
          {% for field in form %}
          <div class="space-y-2">
              <label class="block font-label text-sm font-bold text-on-surface-variant">{{ field.label }}</label>
              {{ field.errors }}
              <input type="password" id="{{ field.id_for_label }}" name="{{ field.html_name }}" class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body" required>
          </div>
          {% endfor %}
          <button type="submit" class="w-full py-4 premium-gradient text-white font-display font-bold rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform">Update Security Credential</button>
      </form>

      <!-- /.social-auth-links -->

    </div>
    {% else %}

    <p>
        The Password Link Was Expired or Invalid
    </p>
    {% endif %}
{% endblock content %}
