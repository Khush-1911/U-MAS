{% extends 'registration/base.html' %}
{% block content %}
    <div class="p-8 space-y-8">
      <div class="text-center">
        <h3 class="text-2xl font-display font-extrabold text-on-surface">Forgot Password</h3>
        <p class="text-on-surface-variant font-body mt-2">Enter your email to receive reset instructions.</p>
      </div>

      <form method="post" class="space-y-6">
          {% csrf_token %}
          {% for field in form %}
          <div class="space-y-2">
              <label class="block font-label text-sm font-bold text-on-surface-variant">{{ field.label }}</label>
              {{ field.errors }}
              <input id="{{ field.id_for_label }}" name="{{ field.html_name }}" type="{{ field.field.widget.input_type|default:'text' }}" class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body" required>
          </div>
          {% endfor %}
          <button type="submit" class="w-full py-4 premium-gradient text-white font-display font-bold rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform">Request Reset</button>
      </form>

      <!-- /.social-auth-links -->

    </div>
{% endblock content %}
