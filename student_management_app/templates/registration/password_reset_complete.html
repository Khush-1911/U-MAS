{% extends 'registration/base.html' %}

        <span class="material-symbols-outlined text-4xl text-secondary">check_circle</span>
      </div>
      <h3 class="text-2xl font-display font-extrabold text-on-surface">Security Updated</h3>

{% endblock content %}
