{% extends 'student_template/base_template.html' %}
{% block page_title %}
Student Profile
{% endblock page_title %}

{% block main_content %}
    <div class="card glass">
      <div class="chart-header">
        <h3>Scholar Identity</h3>
        <p>Manage your academic profile and personal communication settings.</p>
      </div>

      <form class="modern-form" action="{% url 'student_profile_save' %}" method="post">
        {% csrf_token %}
        <div class="form-content">
          <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
              <label>First Name</label>
              <div class="input-wrapper">
                <input type="text" name="first_name" value="{{ user.first_name }}" required>
              </div>
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <div class="input-wrapper">
                <input type="text" name="last_name" value="{{ user.last_name }}" required>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>Master Identity (Email)</label>
            <div class="input-wrapper">
              <input type="email" value="{{ user.email }}" disabled class="disabled-input">
            </div>
          </div>

          <div class="form-group">
            <label>Communication Email (Notifications)</label>
            <div class="input-wrapper">
              <input type="email" name="notification_email" value="{{ user.notification_email }}" placeholder="Optional: defaults to account email">
            </div>
          </div>

          <div class="form-group">
            <label>Current Address</label>
            <div class="input-wrapper">
              <textarea name="address" rows="3" class="form-control" style="width: 100%; padding: 0.75rem; border-radius: 12px; border: 1px solid var(--outline-variant); background: var(--surface-container-low); color: var(--on-surface);">{{ student.address }}</textarea>
            </div>
          </div>

          <div class="form-group" style="margin-top: 1rem;">
            <label>Update Security Credential (Password)</label>
            <div class="input-wrapper">
              <input type="password" name="password" placeholder="Leave blank to maintain current password">
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i>
            Sync Profile
          </button>
        </div>
      </form>
    </div>

    <style>
      .disabled-input {
        background: var(--surface-container-low) !important;
        opacity: 0.7;
        cursor: not-allowed;
      }
    </style>
{% endblock main_content %}
